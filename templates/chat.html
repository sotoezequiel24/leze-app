<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">

<style>
body{margin:0;background:#0b141a;color:white;font-family:sans-serif;}
.header{background:#202c33;padding:15px;}
#messages{height:75vh;overflow:auto;padding:10px;}
.msg{padding:10px;margin:5px;border-radius:10px;max-width:70%;}
.me{background:#005c4b;margin-left:auto;}
.other{background:#202c33;}
.input{position:fixed;bottom:0;width:100%;display:flex;background:#202c33;}
input{flex:1;padding:15px;border:none;}
button{background:#00a884;border:none;padding:15px;color:white;}
</style>
</head>

<body>

<div class="header">
{{to_user}} <span id="typing"></span>
</div>

<div id="messages">
{% for m in messages %}
<div class="msg {% if m[0]==user %}me{% else %}other{% endif %}">
{{m[1]}}
</div>
{% endfor %}
</div>

<div class="input">
<input id="msg">
<button onclick="send()">➤</button>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
var socket = io();
var room = "{{room}}";
var user = "{{user}}";
var to = "{{to_user}}";

socket.emit("join",{room:room});

function send(){
    let msg = document.getElementById("msg").value;
    if(msg==="") return;

    socket.emit("message",{room:room,user:user,to:to,msg:msg});
    document.getElementById("msg").value="";
}

document.getElementById("msg").addEventListener("keypress", function(e){
    socket.emit("typing",{room:room,user:user});
    if(e.key==="Enter"){
        send();
    }
});

socket.on("message", function(data){
    let div=document.createElement("div");
    div.className="msg "+(data.user===user?"me":"other");
    div.innerText=data.msg;
    document.getElementById("messages").appendChild(div);
});

socket.on("typing", function(data){
    document.getElementById("typing").innerText="escribiendo...";
    setTimeout(()=>{document.getElementById("typing").innerText=""},1000);
});
</script>

</body>
</html>
